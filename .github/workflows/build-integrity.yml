name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

# Cancel in-progress runs when starting a new one.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # Verify code format and build integrity for every PR.
  build-integrity:
    name: Build Integrity
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:

      - name: Checkout code
        id: checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Java
        id: install-java
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: sbt

      - name: Install SBT
        id: install-sbt
        uses: sbt/setup-sbt@v1

      # Check format without modifying files. `continue-on-error` allows subsequent
      # steps to inspect the outcome and apply a fix rather than stopping immediately.
      - name: Check format
        id: lint-check
        run: sbt scalafmtCheckAll
        continue-on-error: true

      # Apply scalafmt in-place. Only runs when the check above found violations.
      - name: Fix format
        id: lint-fix
        if: steps.lint-check.outcome == 'failure'
        run: sbt scalafmtAll

      # Commit and push the corrected files.
      - name: Commit format fix
        id: commit-fix
        if: steps.lint-check.outcome == 'failure'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "[format] Fix code formatting with scalafmt."

      # Fail so that the build job does not run on this (pre-fix) commit.
      - name: Restart after format fix
        id: restart
        if: steps.commit-fix.outputs.changes_detected == 'true'
        run: |
          echo "Format violations were found and automatically fixed."
          exit 1

      - name: Build
        id: build-test
        run: sbt 'set ThisBuild / scalacOptions += "-Werror"' compile

      - name: Test
        id: test
        run: sbt test
